<style>
    body {
        margin: 0;
        padding: 0;
    }

    .navbar {
        position: sticky;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px;
        top: 0;
        z-index: 1;
        background: aqua;
    }

    .nav-links {
        display: flex;
        list-style: none;
        gap: 16px;
    }

    .nav-links a {
        text-decoration: none;
        font-size: 16px;
    }

    @media (max-width: 768px) {
        .nav-links {
            flex-direction: column;
            height: auto;
        }
    }
</style>

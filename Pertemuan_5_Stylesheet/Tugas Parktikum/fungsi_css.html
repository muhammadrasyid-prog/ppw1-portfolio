<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Praktikum CSS</title>
</head>
<style>
    /* CSS */
    .indent {
        text-indent: 50px;
    }

    .letter {
        letter-spacing: 5px;
    }

    .word {
        word-spacing: 20px;
    }

    .line {
        line-height: 2;
    }

    .space {
        white-space: pre;
    }
</style>
<body>
    <!-- HTML -->
    <p class="indent">
        Ini adalah contoh paragraf yang menggunakan text-indent.
    </p>

    <p class="letter">
        Contoh teks dengan letter spacing.
    </p>

    <p class="word">
        Contoh teks dengan word spacing.
    </p>

    <p class="line">
        Contoh teks dengan line height agar jarak antar baris lebih luas.
    </p>

    <p class="space">
        Ini contoh
        teks dengan white-space.
    </p>
</body>

</html>

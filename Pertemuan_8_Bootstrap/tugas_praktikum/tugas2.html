<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<style>
    body {
        background: linear-gradient(135deg, #1A56DB, #1E293B);
    }
</style>
<body>
    <div class="container bg-white p-4 my-5 rounded">
        <h2 class="text-center fw-bold my-5">FORMULIR PENDAFTARAN</h2>
        <form class="row g-3">
            <div class="col mb-3">
                <label for="formGroupExampleInput" class="form-label">Full Name</label>
                <input type="text" class="form-control is-valid" value="Rio" placeholder="Full name" aria-label="Full name" required>
            </div>
            <div class="col mb-3">
                <label for="formGroupExampleInput2" class="form-label">NIM</label>
                <input type="text" class="form-control" placeholder="NIM" aria-label="NIM" required>
            </div>
            <div class="mb-3">
                <label for="formGroupExampleInput3" class="form-label">Email</label>

                <div class="input-group">
                    <input type="email" class="form-control is-invalid" id="formGroupExampleInput3" placeholder="Email"
                        aria-label="Email" aria-describedby="basic-addon2" value="rio123.example.com" required>
                    <span class="input-group-text" id="basic-addon2">@example.com</span>
                </div>
            </div>
            <div class="mb-3">
                <label for="formGroupExampleInput4" class="form-label">Program Studi</label>
                <select class="form-select" aria-label="Default select example">
                    <option selected>Pilih Program Studi</option>
                    <option value="1">Kedokteran</option>
                    <option value="2">Teknik Informatika</option>
                    <option value="3">Akuntansi</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="formGroupExampleInput5" class="form-label">Semester</label>
                <select class="form-select" aria-label="Default select example">
                    <option selected>Pilih Semester</option>
                    <option value="1">Semester 1</option>
                    <option value="2">Semester 2</option>
                    <option value="3">Semester 3</option>
                </select>
            </div>
            <div class="form-floating">
                <textarea class="form-control" placeholder="Leave a comment here" id="floatingTextarea2"
                    style="height: 100px"></textarea>
                <label for="floatingTextarea2">Alamat</label>
            </div>
            <div class="mb-3">
                <label for="formFile" class="form-label">Pilih Berkas</label>
                <input class="form-control" type="file" id="formFile">
            </div>

            <div class="d-flex gap-3 my-4">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>

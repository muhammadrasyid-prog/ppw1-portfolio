<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript untuk Pemula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <script src="script.js"></script>

    <!-- Form Pendataan Mahasiswa -->
    <button type="button" class="btn btn-outline-info my-3 mx-2" onclick="tambahData()">Tambah Data Baru</button>
    <!-- Tampilkan Data dalam tabel bootstrap -->
    <h4>Data Mahasiswa</h4>
    <table class="dataMahasiswa table table-striped">
        <thead>
            <tr>
                <th>Nama</th>
                <th>NIM</th>
                <th>Angkatan</th>
                <th>Perkiraan Lusus</th>
                <th>Status NIM</th>
            </tr>
        </thead>
        <tbody id="dataMahasiswa">
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

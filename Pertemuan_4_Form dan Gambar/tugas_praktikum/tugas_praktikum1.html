<!DOCTYPE html>
<html>

<head>
    <title>Contoh Tag HTML</title>
</head>

<body>

    <h2>Contoh Penggunaan Tag HTML</h2>

    <form>

        <fieldset>
            <legend>Data Mahasiswa</legend>

            Nama :
            <input type="text"><br><br>

            Email :
            <input type="email"><br><br>

        </fieldset>

        <br>

        Pilih Browser Favorit :
        <input list="browser">

        <datalist id="browser">
            <option value="Chrome">
            <option value="Firefox">
            <option value="Edge">
            <option value="Safari">
        </datalist>

        <br><br>

        Pilih Jurusan :

        <select>

            <optgroup label="Fakultas Teknik">
                <option>Informatika</option>
                <option>Sistem Informasi</option>
            </optgroup>

            <optgroup label="Fakultas Ekonomi">
                <option>Manajemen</option>
                <option>Akuntansi</option>
            </optgroup>

        </select>

        <br><br>

        Pesan :
        <output>Data berhasil diisi</output>

    </form>

</body>

</html>

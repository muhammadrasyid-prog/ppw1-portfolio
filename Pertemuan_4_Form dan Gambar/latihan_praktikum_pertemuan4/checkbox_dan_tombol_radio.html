<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox dan tombol radio</title>
</head>
<body>
    
    <form action=""> Saya memiliki sebuah sepeda:
        <input type="checkbox" name="sepeda">
        <br>
        Saya memiliki sebuah mobil:
        <input type="checkbox" name="mobil" value="ON">
        <br>
        Jenis kelamin Anda?
        <br>
        Pria:
        <input type="radio" name="sex" value="pria">
        <br>
        Wanita:
        <input type="radio" name="sex" value="wanita">
    </form>
    <p>
        Ketika seorang pengguna memberikan klik mouse pada sebuah tombol radio.
        tombol tersebut terlihat diberi tanda cek, dan semua tomvol lain yang berada
        dalam nama yang sama akan kehilangan tanda cek-nya
    </p>
</body>
</html>

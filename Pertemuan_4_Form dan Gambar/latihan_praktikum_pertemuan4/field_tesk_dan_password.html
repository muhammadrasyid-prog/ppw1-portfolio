<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field teks dan password</title>
</head>
<body>

    <form action="">
        <label for="fname">First Name: </label><br>
        <input type="text" id="fname" name="fname" value="John"><br>
        <label for="lname">Last Name: </label><br>
        <input type="text" id="lname" name="lname" value="Doe"><br>
        <input type="submit" value="Submit">
    </form>

    <p>17. Perhatikan bahwa ketika Anda mengetikkan karakter-karakter
        dalam suatu field password, browser akan menampilkan asterisk
        atau bullet saja, bukannya karakter yang diketikkan.
    </p>

</body>
</html>

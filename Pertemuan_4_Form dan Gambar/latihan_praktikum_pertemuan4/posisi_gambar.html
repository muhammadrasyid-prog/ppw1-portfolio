<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mengatur posisi gambar</title>
</head>
<body>
    <p>
        Sebuah gambar
        <img src="ss.png" align="bottom" width="100" height="50">
        di antara teks.
    </p>
    <p>
        Sebuah gambar
        <img src="ss.png" align="middle" width="100" height="50">
        di antara teks.
    </p>
    <p>
        Sebuah gambar
        <img src="ss.png" align="top" width="100" height="50">
        di antara teks.
    </p>
    <p>Perhatikan bahwa default pengaturan adalah bottom (diletakkan di bagian bawah)</p>
    <p>
        Sebuah gambar
        <img src="ss.png" width="100" height="50">
        di antara teks.
    </p>
    <p>
        <img src="ss.png" align="top" width="100" height="50">
        Sebuah gambar di depan teks.
    </p>
    <p>
        Sebuah gambar di belakang teks.
        <img src="ss.png" align="top" width="100" height="50">
    </p>
</body>
</html>

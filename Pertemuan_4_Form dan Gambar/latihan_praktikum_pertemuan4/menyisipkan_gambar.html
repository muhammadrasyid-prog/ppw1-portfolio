<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menyisipkan gambar latar belakang dan depan</title>
</head>
<body>
    <h3>Lihatlah, ada gambar di latar belakang!</h3>
    <p>
        Baik file gambar dengan format gif maupun jpg dapat digunakan
        sebagai latar belakang HTML.
    </p>
    <p>
        Sebuah gambar dapat dari folder lokal:
        <img src="ss.png" width="144" height="50">
    </p>
    <p>
        Sebuah gambar dapat dari folder lain:
        <img src="ss.png" width="144" height="50">
    </p>
    <p>
        mengambil gambar dari situr lain:
        <img src="https://www.w3schools.com/images/w3schools_green.jpg" width="200" height="50">
    </p>
</body>
</html>

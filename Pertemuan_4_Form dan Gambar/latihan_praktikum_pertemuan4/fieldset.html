<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tombol dan fieldset</title>
</head>
<body>
    <fieldset>
        <legend>Informasi kesehatan:</legend>
        <form action="">
            Tinggi <input type="text" size="3">
            Berat <input type="text" size="3">
            <br><br>
            <input type="button" value="Ada tombol disini">
        </form>
    </fieldset>
    <p>
        Bila tidak terlihat adanya border di sekeliling form input,
        browser Anda sudah telalu lama.
    </p>
</body>
</html>

<!-- List bersarang dan list definisi -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar PW</title>
</head>
<body>
    <h4>Sebuah list bersarang:</h4>
    <ul>
        <li>Kopi</li>
        <li>Teh
            <ul>
                <li>Teh hitam</li>
                <li>Teh hijau</li>
            </ul>
        </li>
        <li>Susu</li>
    </ul>
    <br>
    <h4>Contoh list definis:</h4>
    <dl>
        <dt>Kopi</dt>
        <dd>Minuman panas hitam</dd>
        <dt>Susu</dt>
        <dd>Minuman putih dingin</dd>
    </dl>
</body>
</html>
